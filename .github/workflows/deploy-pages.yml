name: Deploy Noor prototype to GitHub Pages

on:
  push:
    branches:
      - claude/busy-franklin-nzj9eu
      - main
    paths:
      - 'noor-prototype/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages (auto-enable)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: noor-prototype

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
