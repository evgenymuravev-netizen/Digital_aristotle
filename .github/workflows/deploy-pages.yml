name: Publish Noor prototype to GitHub Pages

# Pages serves the gh-pages branch (legacy branch mode — enabled automatically).
# This workflow keeps gh-pages in sync with noor-prototype/ on every push.

on:
  push:
    branches:
      - claude/busy-franklin-nzj9eu
      - main
    paths:
      - 'noor-prototype/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-sync
  cancel-in-progress: true

jobs:
  sync-gh-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Push site to gh-pages
        run: |
          cd noor-prototype
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish Noor prototype (${GITHUB_SHA::7})"
          git push --force "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" gh-pages:gh-pages
